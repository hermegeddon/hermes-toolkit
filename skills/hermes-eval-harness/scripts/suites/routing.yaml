# Routing-compliance suite — the suite that catches the DELEGATION-EXPLOSION
# anti-pattern (verified on the author's homelab build, 2026-06-04).
#
# THE PROBLEM IT GUARDS: a simple, deterministic ops query ("is X running?")
# was being routed through delegate_task, which spent 6-17 model calls over
# 90-150s and sometimes wandered and timed out — where the CORRECT behavior is
# ONE direct cluster-ops tool call (~1-3 model turns). This suite encodes
# "match the mechanism to the task":
#   * deterministic single-command op  -> DIRECT cluster-ops call, NEVER delegate
#   * reasoning / judgment / multi-step -> delegate_task is appropriate
#
# Measured baseline: apex-fast routing compliance was 80% overall but 100% on
# the DIRECT-vs-DELEGATE axis (the one this suite measures). Run on the `ops`
# profile (it carries mcp-cluster-ops; the default orchestrator does not).
#
# LIBRARY BACKEND ONLY: max_llm_calls / not_tool_called / tool_called all need
# the trajectory, which the api/cli backends do not expose.
#   python ../hermes_eval.py --suite routing.yaml --backend library --workers 4 \
#          --model apex-fast:latest
#
# TOOL-NAME CALIBRATION: assertions use the `cluster_ops_*` underscore form. If
# your MCP bridge emits `mcp_cluster_ops_*`, print one result["messages"] and
# adjust (flagged in CHANGELOG). delegate_task is the orchestrator's delegation
# tool — confirm its emitted name once as well.
suite: routing-compliance

defaults:
  max_iterations: 20   # deliberately generous: we WANT to see if it wanders, not cap it early
  timeout: 180

cases:
  # ===== DIRECT cases: single-command ops -> one cluster-ops call, NO delegation =====
  - id: route-service-status
    category: route-direct
    prompt: "Is the hermes-gateway service running?"
    assert:
      - { type: no_error }
      - { type: tool_called, tool: cluster_ops_service_status }
      - { type: not_tool_called, tool: delegate_task }   # MUST NOT delegate a status check
      - { type: max_llm_calls, n: 3 }                    # one direct call, not a 6-17 turn run
      - { type: latency_under, seconds: 60 }             # generous; a delegated run blows past this

  - id: route-disk-free
    category: route-direct
    prompt: "How much disk is free?"
    assert:
      - { type: no_error }
      - { type: tool_called, tool: cluster_ops_disk_usage }
      - { type: not_tool_called, tool: delegate_task }
      - { type: max_llm_calls, n: 3 }

  - id: route-tail-gateway-log
    category: route-direct
    prompt: "Tail the gateway log."
    assert:
      - { type: no_error }
      - { type: tool_called, tool: cluster_ops_journal_tail }
      - { type: not_tool_called, tool: delegate_task }
      - { type: max_llm_calls, n: 3 }

  # ===== DELEGATE cases: reasoning / judgment / multi-step -> delegate_task IS correct =====
  - id: route-debug-and-fix
    category: route-delegate
    prompt: "Debug why the gateway keeps crashing and propose a fix."
    assert:
      - { type: no_error }
      # This one SHOULD delegate — it needs investigation + judgment, not a single command.
      - { type: tool_called, tool: delegate_task }

  - id: route-plan-migration
    category: route-delegate
    prompt: "Plan a migration of the lore DB to the new host."
    assert:
      - { type: no_error }
      - { type: tool_called, tool: delegate_task }
